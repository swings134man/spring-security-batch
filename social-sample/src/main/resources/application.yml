spring:
  application:
    name: social-sample

  profiles:
    active: local

  config:
    import:
      - classpath:/configs/application-dev.yml
      - classpath:/configs/application-local.yml

  # JSON 직렬화 설정
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    issuer: social-sample
    access-token-minutes: 60
    refresh-token-days: 7
    pending-token-minutes: 30

  auth-cookie:
    secure: true

  security:
    public-paths:
      - /
      - /error
      - /css/**
      - /js/**
      - /images/**
      - /h2-console/**
      - /auth/**
      - /oauth2/**
      - /login/**
      - /social/complete/**
