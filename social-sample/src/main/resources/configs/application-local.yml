# Local 개발 환경 설정
spring:
  config:
    activate:
      on-profile: local

  # H2 인메모리 데이터베이스
  datasource:
    url: jdbc:h2:mem:social;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 설정
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false # logging.level 대체
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql

  # Redis (로컬에서 Redis 없을 경우 대비)
  data:
    redis:
      host: localhost
      port: 6379
      password:

  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
        registration:
          kakao:
            provider: kakao
            client-id: ${KAKAO_CLIENT_ID:kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
          naver:
            provider: naver
            client-id: ${NAVER_CLIENT_ID:naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:naver-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

app:
  auth-cookie:
    secure: false

# 로깅
logging:
  level:
    com.findcar: DEBUG
    org.hibernate.SQL: DEBUG
#    org.springframework.security: DEBUG
#    org.hibernate.type.descriptor.sql: TRACE
