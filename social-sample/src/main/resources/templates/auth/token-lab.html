<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Token Lab</title>
  <style>
    body { font-family: "Pretendard", sans-serif; margin: 0; background: #f8fafc; }
    .top { background: #0f172a; padding: 12px 18px; }
    .top a { color: #e2e8f0; text-decoration: none; font-weight: 700; }
    .box { max-width: 860px; margin: 40px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08); }
    textarea, input, button { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 10px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
<div class="top"><a href="/">Sample</a></div>
<div class="box">
  <h2>Token Lab</h2>
  <p>AT는 전역 메모리(sessionStorage)에서 가져와 표시합니다. RT는 HttpOnly 쿠키로 자동 전송됩니다.</p>

  <label>Stored Access Token (Global Memory)</label>
  <textarea id="storedAccessToken" readonly></textarea>
  <button onclick="loadAccessTokenFromMemory()">전역 메모리에서 AT 불러오기</button>

  <label>Access Token</label>
  <textarea id="accessToken"></textarea>

  <button onclick="callMe()">GET /api/auth/me</button>
  <button onclick="refreshTokenReq()">POST /api/auth/refresh</button>
  <button onclick="logoutReq()">POST /api/auth/logout</button>

  <h3>Result</h3>
  <pre id="result"></pre>
</div>

<script>
  const result = document.getElementById('result');
  const storedAccessTokenText = document.getElementById('storedAccessToken');
  const accessTokenInput = document.getElementById('accessToken');

  function loadAccessTokenFromMemory() {
    const token = window.__APP_ACCESS_TOKEN__ || sessionStorage.getItem('app_access_token') || '';
    storedAccessTokenText.value = token;
    accessTokenInput.value = token;
  }

  loadAccessTokenFromMemory();

  async function callMe() {
    const accessToken = accessTokenInput.value.trim();
    const res = await fetch('/api/auth/me', {
      credentials: 'include',
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const nextAccessToken = res.headers.get('X-Access-Token');
    if (nextAccessToken) {
      window.__APP_ACCESS_TOKEN__ = nextAccessToken;
      sessionStorage.setItem('app_access_token', nextAccessToken);
      loadAccessTokenFromMemory();
    }
    result.textContent = await res.text();
  }

  async function refreshTokenReq() {
    const res = await fetch('/api/auth/refresh', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' }
    });
    const nextAccessToken = res.headers.get('X-Access-Token');
    if (nextAccessToken) {
      window.__APP_ACCESS_TOKEN__ = nextAccessToken;
      sessionStorage.setItem('app_access_token', nextAccessToken);
      loadAccessTokenFromMemory();
    }
    result.textContent = await res.text();
  }

  async function logoutReq() {
    const res = await fetch('/api/auth/logout', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' }
    });
    window.__APP_ACCESS_TOKEN__ = '';
    sessionStorage.removeItem('app_access_token');
    loadAccessTokenFromMemory();
    result.textContent = await res.text();
  }
</script>
</body>
</html>
