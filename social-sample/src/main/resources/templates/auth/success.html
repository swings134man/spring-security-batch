<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 성공</title>
  <style>
    body { font-family: "Pretendard", sans-serif; margin: 0; background: #f8fafc; }
    .box { max-width: 720px; margin: 40px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08); }
    textarea { width: 100%; min-height: 120px; margin-top: 8px; }
    a { display: inline-block; margin-top: 16px; }
  </style>
</head>
<body>
<div class="box">
  <h2>로그인 성공</h2>
  <p>아래 토큰으로 API를 호출할 수 있습니다.</p>
  <h3>Access Token</h3>
  <textarea readonly th:text="${accessToken}"></textarea>
  <h3>Refresh Token</h3>
  <textarea readonly th:text="${refreshToken}"></textarea>
  <a href="/auth/token-lab">토큰 테스트 페이지 이동</a>
</div>
</body>
</html>
